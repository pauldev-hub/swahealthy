{% extends "base.html" %}

{% block content %}
<div class="container app-page duration-page-container" style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 100px); padding: 20px;">
    <div class="card duration-card" style="max-width: 480px; width: 100%; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: none; border-top: 6px solid var(--primary); background: #ffffff; transition: transform 0.3s ease;">
        <div style="text-align: center; margin-bottom: 35px;">
            <div class="duration-icon-wrapper" style="width: 80px; height: 80px; background: #f0f7ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <span style="font-size: 2.5rem;">⏳</span>
            </div>
            <h2 data-i18n="duration_question" style="font-size: 1.5rem; color: var(--text-dark); font-weight: 700; line-height: 1.3;">How long have you had these symptoms?</h2>
            <p style="color: var(--text-light); margin-top: 10px; font-size: 0.95rem;">This helps us provide a more accurate assessment.</p>
        </div>

        <form id="duration-form" onsubmit="submitDuration(event)">
            <div class="duration-options-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 35px;">
                <label class="duration-option">
                    <input type="radio" name="duration" value="< 1 day" checked style="display: none;">
                    <div class="option-content">
                        <span class="option-text" data-i18n="duration_less_1">< 1 day</span>
                    </div>
                </label>
                <label class="duration-option">
                    <input type="radio" name="duration" value="1-3 days" style="display: none;">
                    <div class="option-content">
                        <span class="option-text" data-i18n="duration_1_3">1–3 days</span>
                    </div>
                </label>
                <label class="duration-option">
                    <input type="radio" name="duration" value="4-7 days" style="display: none;">
                    <div class="option-content">
                        <span class="option-text" data-i18n="duration_4_7">4–7 days</span>
                    </div>
                </label>
                <label class="duration-option">
                    <input type="radio" name="duration" value="7+ days" style="display: none;">
                    <div class="option-content">
                        <span class="option-text" data-i18n="duration_7_plus">7+ days</span>
                    </div>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-block pulse-hover" style="padding: 18px; font-weight: 700; font-size: 1.1rem; border-radius: 16px; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 8px 20px rgba(29, 106, 150, 0.3);">
                <span data-i18n="check_symptoms">Check Symptoms</span>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </form>
    </div>
</div>


{% endblock %}
